<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2196F3">
    <meta name="description" content="语音翻译器 - 实时语音翻译应用">
    <title>语音翻译器</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        /* Install prompt styles */
        .install-prompt {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #2196F3, #1976D2);
            color: white;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
            z-index: 1000;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }
        
        .install-prompt.show {
            transform: translateY(0);
        }
        
        .install-prompt .text {
            font-size: 14px;
        }
        
        .install-prompt .btn {
            background: white;
            color: #2196F3;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .install-prompt .dismiss {
            background: transparent;
            color: white;
            border: 1px solid rgba(255,255,255,0.5);
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <h1>🎙️ 语音翻译器</h1>
            <button id="settingsBtn" class="icon-btn" aria-label="设置">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </button>
        </header>

        <!-- Language Selection -->
        <section class="language-section">
            <div class="language-selector">
                <label>源语言</label>
                <select id="sourceLang">
                    <option value="zh-CN" selected>中文 (简体)</option>
                    <option value="en-US">English</option>
                    <option value="ja-JP">日本語</option>
                    <option value="ko-KR">한국어</option>
                </select>
            </div>
            
            <div class="swap-btn" id="swapBtn" title="交换语言">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M7 16V4M7 4L3 8M7 4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/>
                </svg>
            </div>
            
            <div class="language-selector">
                <label>目标语言</label>
                <select id="targetLang">
                    <option value="en" selected>English</option>
                    <option value="ja">日本語</option>
                    <option value="ko">한국어</option>
                    <option value="es">Español</option>
                    <option value="fr">Français</option>
                    <option value="de">Deutsch</option>
                    <option value="ru">Русский</option>
                    <option value="pt">Português</option>
                    <option value="it">Italiano</option>
                    <option value="ar">العربية</option>
                    <option value="th">ไทย</option>
                    <option value="vi">Tiếng Việt</option>
                    <option value="zh">中文</option>
                </select>
            </div>
        </section>

        <!-- Text Display Areas -->
        <section class="display-section">
            <div class="text-card original-card">
                <div class="card-header">
                    <span class="card-title">原声文字</span>
                    <span class="status-dot" id="recordingStatus"></span>
                </div>
                <div class="text-content placeholder" id="originalText">
                    点击麦克风开始说话...
                </div>
            </div>

            <div class="text-card translated-card">
                <div class="card-header">
                    <span class="card-title" id="translatedLabel">English 翻译</span>
                    <span class="translation-status" id="translationStatus"></span>
                </div>
                <div class="text-content placeholder" id="translatedText">
                    翻译内容将显示在这里
                </div>
            </div>
        </section>

        <!-- Control Buttons -->
        <section class="control-section">
            <button id="playBtn" class="control-btn play-btn" disabled>
                <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
            </button>
            
            <button id="recordBtn" class="control-btn record-btn">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="currentColor" class="mic-icon">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                    <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
                <svg width="36" height="36" viewBox="0 0 24 24" fill="currentColor" class="stop-icon" style="display:none;">
                    <rect x="6" y="6" width="12" height="12" rx="2"/>
                </svg>
            </button>
            
            <button id="clearBtn" class="control-btn clear-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                </svg>
            </button>
        </section>

        <!-- Status Bar -->
        <footer class="status-bar">
            <div class="status-line">
                <span id="connectionStatus">● 就绪 - 点击麦克风开始</span>
            </div>
            <div id="infoText"></div>
        </footer>
        
        <!-- Install Prompt -->
        <div class="install-prompt" id="installPrompt">
            <div class="text">安装应用到桌面</div>
            <div>
                <button class="dismiss" id="dismissInstall">暂不</button>
                <button class="btn" id="installBtn">安装</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>设置</h2>
                <button id="closeSettings" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="setting-item">
                    <label>语音语速</label>
                    <input type="range" id="speechRate" min="0.5" max="2" step="0.1" value="1">
                    <span id="speechRateValue">1.0x</span>
                </div>
                <div class="setting-item">
                    <label>翻译API</label>
                    <select id="translationApi">
                        <option value="mymemory">MyMemory (免费)</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // PWA Install Prompt
        let deferredPrompt;
        const installPrompt = document.getElementById('installPrompt');
        const installBtn = document.getElementById('installBtn');
        const dismissInstall = document.getElementById('dismissInstall');

        // Check if PWA is already installed
        if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
            console.log('App is installed');
        }

        // Listen for beforeinstallprompt
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            // Show install prompt after a delay
            setTimeout(() => {
                if (!localStorage.getItem('installDismissed')) {
                    installPrompt.classList.add('show');
                }
            }, 3000);
        });

        // Install button click
        installBtn.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            deferredPrompt = null;
            installPrompt.classList.remove('show');
            if (outcome === 'accepted') {
                console.log('App installed');
            }
        });

        // Dismiss button
        dismissInstall.addEventListener('click', () => {
            localStorage.setItem('installDismissed', 'true');
            installPrompt.classList.remove('show');
        });
    </script>
</body>
</html>
